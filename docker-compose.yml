version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: ssts_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ssts_db
      POSTGRES_USER: ssts_user
      POSTGRES_PASSWORD: ssts_password
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ssts_network

  # Redis Cache & Pub/Sub
  redis:
    image: redis:7-alpine
    container_name: ssts_redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    networks:
      - ssts_network
    command: redis-server --appendonly yes

  # NestJS Backend API
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ssts_api
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - '3000:3000'
    depends_on:
      - postgres
      - redis
    networks:
      - ssts_network
    volumes:
      - .:/app
      - /app/node_modules

volumes:
  postgres_data:
  redis_data:

networks:
  ssts_network:
    driver: bridge